<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cognitive Tests</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 480px;
            padding: 24px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .menu-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .menu-header h1 {
            font-size: 1.08rem; /* 60% of the previous 1.8rem */
            color: #333;
            margin-bottom: 8px;
        }

        .menu-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-list button {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .menu-list button:hover {
            background-color: #2980b9;
        }

        .menu-list button:active {
            background-color: #1f6391;
        }

        /* User ID line in the menu header */
        .user-line {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #555;
        }

        .link-btn {
            background: none;
            border: none;
            color: #2980b9;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.8rem;
            padding: 0;
            margin-left: 6px;
        }

        /* Setup / reset forms */
        .setup-card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .setup-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .setup-field label {
            font-size: 0.85rem;
            color: #555;
        }

        .setup-field input {
            font-size: 0.9rem;
            padding: 10px 12px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            outline: none;
        }

        .setup-field input:focus {
            border-color: #3498db;
        }

        .setup-error {
            color: #c0392b;
            font-size: 0.8rem;
            min-height: 1em;
            text-align: center;
        }

        .setup-btn-row {
            display: flex;
            gap: 12px;
        }

        .setup-btn-row button {
            flex: 1;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #3498db;
        }

        .setup-btn-row button.btn-secondary {
            background-color: #95a5a6;
        }

        /* Password-protected reset modal */
        #reset-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        #reset-modal.on {
            display: flex;
        }

        #reset-box {
            background: #fff;
            border-radius: 10px;
            width: 320px;
            max-width: 88vw;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #reset-box h3 {
            font-size: 1rem;
            color: #333;
            text-align: center;
        }

        /* Pending (unsent) log modal */
        #pending-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        #pending-modal.on {
            display: flex;
        }

        #pending-box {
            background: #fff;
            border-radius: 10px;
            width: 420px;
            max-width: 92vw;
            max-height: 70vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #pending-box h3 {
            font-size: 1rem;
            color: #333;
            text-align: center;
        }

        #pending-content {
            font-size: 11px;
            font-family: monospace;
            color: #333;
            overflow-y: auto;
            flex: 1;
            white-space: pre-wrap;
            word-break: break-all;
            background: #f5f5f5;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

    </style>
</head>
<body>
    <div id="game-container">
        <!-- First-launch setup: shown until a User ID exists -->
        <section id="page-setup" class="page">
            <div class="menu-header">
                <h1>Cognitive Tests</h1>
                <p>Set a User ID to begin.</p>
            </div>
            <div class="setup-card">
                <div class="setup-field">
                    <label for="setup-pwd">Password</label>
                    <input type="password" id="setup-pwd" placeholder="Enter password">
                </div>
                <div class="setup-field">
                    <label for="setup-id">User ID</label>
                    <input type="text" id="setup-id" placeholder="Enter user ID">
                </div>
                <div class="setup-error" id="setup-error"></div>
                <div class="setup-btn-row">
                    <button class="btn-secondary" onclick="skipSetup()">Skip (Guest)</button>
                    <button onclick="saveSetup()">Save</button>
                </div>
            </div>
        </section>

        <section id="page-1" class="page">
            <div class="menu-header">
                <h1>Cognitive Tests</h1>
                <p>Select a test to begin.</p>
                <p class="user-line">User ID: <strong id="uid"></strong><button class="link-btn" onclick="openResetModal()">Change</button></p>
                <p id="pending-indicator" style="display:none;color:#c0392b;font-size:0.8rem;margin-top:8px;cursor:pointer;" onclick="openPendingModal()">&#9888; <span id="pending-count">0</span> unsent log(s) &mdash; tap to view</p>
            </div>
            <div class="menu-list">
                <button onclick="window.location.href='corsi.html'">Corsi Block-Tapping Task</button>
                <button onclick="window.location.href='visualsearch.html'">Visual Search Task</button>
                <button onclick="window.location.href='dccs.html'">Dimensional Change Card Sort</button>
                <button onclick="window.location.href='wcsi.html'">Wisconsin Card Sorting Test</button>
            </div>
        </section>
    </div>

    <!-- Password-protected User ID reset -->
    <div id="reset-modal">
        <div id="reset-box">
            <h3>Change User ID</h3>
            <div class="setup-field">
                <label for="reset-pwd">Password</label>
                <input type="password" id="reset-pwd" placeholder="Enter password">
            </div>
            <div class="setup-field">
                <label for="reset-id">New User ID</label>
                <input type="text" id="reset-id" placeholder="Enter new ID">
            </div>
            <div class="setup-error" id="reset-error"></div>
            <div class="setup-btn-row">
                <button class="btn-secondary" onclick="closeResetModal()">Cancel</button>
                <button onclick="confirmReset()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Unsent remote-log entries (view + manual retry) -->
    <div id="pending-modal">
        <div id="pending-box">
            <h3>Unsent logs (stored locally)</h3>
            <div id="pending-content"></div>
            <div class="setup-btn-row">
                <button class="btn-secondary" onclick="closePendingModal()">Close</button>
                <button style="background-color:#2ecc71" onclick="retryPending()">Retry All</button>
            </div>
        </div>
    </div>

    <script>
        const USER_KEY = 'cogtests_user_id';
        const MANAGER_PWD = '2357';

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function applyUserId(id) {
            localStorage.setItem(USER_KEY, id);
            document.getElementById('uid').textContent = id;
        }

        // First-launch setup
        function saveSetup() {
            const pwd = document.getElementById('setup-pwd').value;
            const id = document.getElementById('setup-id').value.trim();
            const err = document.getElementById('setup-error');
            if (pwd !== MANAGER_PWD) { err.textContent = 'Incorrect password.'; return; }
            if (!id) { err.textContent = 'Please enter a user ID.'; return; }
            applyUserId(id);
            showPage('page-1');
        }

        function skipSetup() {
            applyUserId('guest');
            showPage('page-1');
        }

        // Password-protected reset flow
        function openResetModal() {
            document.getElementById('reset-pwd').value = '';
            document.getElementById('reset-id').value = '';
            document.getElementById('reset-error').textContent = '';
            document.getElementById('reset-modal').classList.add('on');
        }

        function closeResetModal() {
            document.getElementById('reset-modal').classList.remove('on');
        }

        function confirmReset() {
            const pwd = document.getElementById('reset-pwd').value;
            const id = document.getElementById('reset-id').value.trim();
            const err = document.getElementById('reset-error');
            if (pwd !== MANAGER_PWD) { err.textContent = 'Incorrect password.'; return; }
            if (!id) { err.textContent = 'Please enter a new ID.'; return; }
            applyUserId(id);
            closeResetModal();
        }

        // On load: reuse the stored ID, or ask the manager to set one
        const savedId = localStorage.getItem(USER_KEY);
        if (savedId) {
            document.getElementById('uid').textContent = savedId;
            showPage('page-1');
        } else {
            showPage('page-setup');
        }

        // ─── Remote logging: Data Foundry (drain + pending-log UI) ──────────
        // The games create and send the entries; this page shows the unsent
        // queue, retries it on load, and offers a manual Retry All.
        const DF_SOURCE_ID = 'd257ec2928fb945e6';
        const DF_CONFIGS = {
            corsi: { dataset: '25600', activity: 'corsi', token: 'TUxwT2hGc3JqdEd2ZG5zTHZabWpQYjljaG81WldkMW1sd1lwbTNRNmY0dz0=' },
            vst:   { dataset: '25601', activity: 'vst',   token: 'b0V4UDFLa3RJOVBNdkV0eE1JUGxRZTVYeVkwN3hhcEJDMW4zUE8wbjZ5Yz0=' },
            dccs:  { dataset: '25602', activity: 'dccs',  token: 'RlhKYktxYmZRVzlxbjc0M1VJNWJaQlcyRkhpNk5oL3BZQVcxTXRndEg2Yz0=' },
            wcst:  { dataset: '25603', activity: 'wcst',  token: 'Ynh2Q2xVZHhLSzNuUy9aS2Z3dkozMEhkMitEY25GV3FBM3VkaEZ5Rm9uaz0=' }
        };
        const PENDING_KEY = 'cogtests_pending_log';

        function postToDF(game, entry) {
            const cfg = DF_CONFIGS[game];
            const data = { ...entry };
            if (data.trials !== undefined) data.trials = JSON.stringify(data.trials);
            return fetch(`https://datafoundry.id.tue.nl/api/v1/datasets/ts/${cfg.dataset}?activity=${cfg.activity}`, {
                method: 'POST',
                mode: 'cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json', 'api_token': cfg.token, 'source_id': DF_SOURCE_ID },
                redirect: 'follow',
                referrerPolicy: 'no-referrer',
                body: JSON.stringify(data)
            }).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r; });
        }

        function getPending() {
            try { return JSON.parse(localStorage.getItem(PENDING_KEY)) || []; }
            catch (e) { return []; }
        }

        function setPending(queue) {
            localStorage.setItem(PENDING_KEY, JSON.stringify(queue));
            updatePendingIndicator();
        }

        function updatePendingIndicator() {
            const n = getPending().length;
            document.getElementById('pending-indicator').style.display = n > 0 ? 'block' : 'none';
            document.getElementById('pending-count').textContent = n;
        }

        let _draining = false;
        function drainPending() {
            if (_draining) return;
            const queue = getPending();
            if (queue.length === 0) return;
            _draining = true;
            const item = queue[0];
            postToDF(item.game, item.entry)
                .then(() => {
                    console.log('DF drained entry:', item);
                    const q = getPending();
                    q.shift();
                    setPending(q);
                    _draining = false;
                    drainPending();
                })
                .catch(err => { console.warn('DF drain failed, will retry later:', err); _draining = false; });
        }

        function openPendingModal() {
            const queue = getPending();
            document.getElementById('pending-content').textContent =
                queue.length === 0 ? '(none)' : queue.map(e => JSON.stringify(e)).join('\n');
            document.getElementById('pending-modal').classList.add('on');
        }

        function closePendingModal() {
            document.getElementById('pending-modal').classList.remove('on');
        }

        function retryPending() {
            closePendingModal();
            drainPending();
        }

        updatePendingIndicator();
        drainPending();
    </script>
</body>
</html>
