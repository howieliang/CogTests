<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cognitive Tests</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        #menu-container {
            width: 100%;
            max-width: 480px;
            padding: 24px;
        }

        .menu-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .menu-header h1 {
            font-size: 1.08rem;
            color: #333;
            margin-bottom: 8px;
        }

        .menu-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-list button {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .menu-list button:hover {
            background-color: #2980b9;
        }

        .menu-list button:active {
            background-color: #1f6391;
        }

        /* Tests already completed today by the current user */
        .menu-list button.done {
            background-color: #2ecc71;
        }

        .menu-list button.done:hover {
            background-color: #27ae60;
        }

        /* Developer shortcut (User ID 0): mark all tests complete */
        #dev-done-btn {
            display: none;
            margin: 16px auto 0;
            padding: 8px 16px;
            font-size: 0.8rem;
            color: #555;
            background: #e8e8ee;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<button onclick="window.location.href='index.html'" style="position:fixed;top:12px;left:12px;background-color:#95a5a6;color:white;border:none;padding:6px 14px;font-size:14px;border-radius:4px;cursor:pointer;z-index:10;">Back</button>

<div style="position:fixed;top:12px;right:12px;background-color:#e8e8ee;color:#555;padding:6px 14px;font-size:14px;border-radius:4px;z-index:10;">User: <span id="user-badge"></span></div>

    <div id="menu-container">
        <div class="menu-header">
            <h1>Cognitive Tests</h1>
            <p>Complete these tests</p>
        </div>
        <div class="menu-list">
            <button data-game="corsi" onclick="goTest('corsi.html')">Corsi Block-Tapping (~3 minutes)</button>
            <button data-game="vst" onclick="goTest('visualsearch.html')">Visual Search (~5 minutes)</button>
            <button data-game="dccs" onclick="goTest('dccs.html')">Dimensional Change Card Sort (~5 minutes)</button>
            <button data-game="wcst" onclick="goTest('wcsi.html')">Wisconsin Card Sorting (~10 minutes)</button>
        </div>
        <button id="dev-done-btn" onclick="devSetDone()">Set done</button>
    </div>

    <script>
        const USER_KEY = 'cogtests_user_id';
        const COMPLETIONS_KEY = 'cogtests_completions';

        document.getElementById('user-badge').textContent =
            localStorage.getItem(USER_KEY) || 'guest';

        // Button-press sound: same 'pop' as in the tests (D5, 0.1s)
        function playPop() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(587.33, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch (e) {}
        }

        // Navigate after a beat so the pop is audible
        function goTest(url) {
            playPop();
            setTimeout(() => { window.location.href = url; }, 120);
        }

        // ─── Completion state: green buttons for tests done today ───────────
        function toISO(d) {
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
        }

        // Dev mode (User ID 0): completion dates follow the simulated calendar date
        function devTodayISO() {
            if ((localStorage.getItem(USER_KEY) || '') === '0') {
                const s = sessionStorage.getItem('cogtests_dev_date');
                if (s) return s;
            }
            return toISO(new Date());
        }

        function markDoneButtons() {
            let rec = null;
            try { rec = JSON.parse(localStorage.getItem(COMPLETIONS_KEY)); } catch (e) {}
            const user = localStorage.getItem(USER_KEY) || 'guest';
            const valid = rec && rec.user_id === user && rec.days;
            const doneList = valid ? (rec.days[devTodayISO()] || []) : [];
            document.querySelectorAll('.menu-list button').forEach(btn => {
                btn.classList.toggle('done', doneList.includes(btn.dataset.game));
            });
        }

        markDoneButtons();

        // Developer shortcut (User ID 0): mark all four tests complete
        // for the current (possibly simulated) day
        function devSetDone() {
            playPop();
            const user = localStorage.getItem(USER_KEY) || 'guest';
            let rec = null;
            try { rec = JSON.parse(localStorage.getItem(COMPLETIONS_KEY)); } catch (e) {}
            if (!rec || rec.user_id !== user || !rec.days) rec = { user_id: user, days: {} };
            rec.days[devTodayISO()] = ['corsi', 'vst', 'dccs', 'wcst'];
            localStorage.setItem(COMPLETIONS_KEY, JSON.stringify(rec));
            markDoneButtons();
        }

        if ((localStorage.getItem(USER_KEY) || '') === '0') {
            document.getElementById('dev-done-btn').style.display = 'block';
        }

        // ─── Remote logging: Data Foundry (offline-queue drain on load) ─────
        const DF_SOURCE_ID = 'd257ec2928fb945e6';
        const DF_CONFIGS = {
            corsi: { dataset: '25600', activity: 'corsi', token: 'TUxwT2hGc3JqdEd2ZG5zTHZabWpQYjljaG81WldkMW1sd1lwbTNRNmY0dz0=' },
            vst:   { dataset: '25601', activity: 'vst',   token: 'b0V4UDFLa3RJOVBNdkV0eE1JUGxRZTVYeVkwN3hhcEJDMW4zUE8wbjZ5Yz0=' },
            dccs:  { dataset: '25602', activity: 'dccs',  token: 'RlhKYktxYmZRVzlxbjc0M1VJNWJaQlcyRkhpNk5oL3BZQVcxTXRndEg2Yz0=' },
            wcst:  { dataset: '25603', activity: 'wcst',  token: 'Ynh2Q2xVZHhLSzNuUy9aS2Z3dkozMEhkMitEY25GV3FBM3VkaEZ5Rm9uaz0=' }
        };
        const PENDING_KEY = 'cogtests_pending_log';

        function postToDF(game, entry) {
            const cfg = DF_CONFIGS[game];
            const data = { ...entry };
            if (data.trials !== undefined) data.trials = JSON.stringify(data.trials);
            return fetch(`https://datafoundry.id.tue.nl/api/v1/datasets/ts/${cfg.dataset}?activity=${cfg.activity}`, {
                method: 'POST',
                mode: 'cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json', 'api_token': cfg.token, 'source_id': DF_SOURCE_ID },
                redirect: 'follow',
                referrerPolicy: 'no-referrer',
                body: JSON.stringify(data)
            }).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r; });
        }

        function getPending() {
            try { return JSON.parse(localStorage.getItem(PENDING_KEY)) || []; }
            catch (e) { return []; }
        }

        function setPending(queue) {
            localStorage.setItem(PENDING_KEY, JSON.stringify(queue));
        }

        let _draining = false;
        function drainPending() {
            if (_draining) return;
            const queue = getPending();
            if (queue.length === 0) return;
            _draining = true;
            const item = queue[0];
            postToDF(item.game, item.entry)
                .then(() => {
                    console.log('DF drained entry:', item);
                    const q = getPending();
                    q.shift();
                    setPending(q);
                    _draining = false;
                    drainPending();
                })
                .catch(err => { console.warn('DF drain failed, will retry later:', err); _draining = false; });
        }

        drainPending();
    </script>
</body>
</html>
